# This rule is not used by the project GreenScaler-Operator
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the app.example.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: GreenScaler-Operator
    app.kubernetes.io/managed-by: kustomize
  name: servicemonitoring-editor-role
rules:
- apiGroups:
  - app.example.com
  resources:
  - servicemonitorings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - app.example.com
  resources:
  - servicemonitorings/status
  verbs:
  - get
