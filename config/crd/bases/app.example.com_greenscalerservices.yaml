---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: greenscalerservices.app.example.com
spec:
  group: app.example.com
  names:
    kind: GreenScalerService
    listKind: GreenScalerServiceList
    plural: greenscalerservices
    singular: greenscalerservice
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GreenScalerService is the Schema for the greenscalerservices
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GreenScalerService
            properties:
              schedule:
                description: |-
                  schedule defines time windows and the replica count for each window.
                  The first window that matches the current local time (in timeZone) wins.
                items:
                  description: |-
                    ScaleWindow is a half-open [from, to) interval in local wall-clock time (HH:MM, 24h).
                    If from equals to, the window is treated as the full 24-hour day.
                  properties:
                    from:
                      description: from is the inclusive start of the window (HH:MM).
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                    replicas:
                      description: replicas is the desired replica count while this
                        window is active.
                      format: int32
                      minimum: 0
                      type: integer
                    to:
                      description: to is the exclusive end of the window (HH:MM),
                        except when from == to (full day).
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                  required:
                  - from
                  - replicas
                  - to
                  type: object
                minItems: 1
                type: array
              targets:
                description: targets lists workloads (Deployments or StatefulSets)
                  to scale.
                items:
                  description: ScaleTarget identifies a workload to scale.
                  properties:
                    kind:
                      description: 'kind is the workload API kind. Supported values:
                        Deployment, StatefulSet.'
                      enum:
                      - Deployment
                      - StatefulSet
                      type: string
                    name:
                      description: name is the target resource name.
                      type: string
                    namespace:
                      description: namespace is the target namespace. If empty, the
                        GreenScalerService's namespace is used.
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                minItems: 1
                type: array
              timeZone:
                description: |-
                  timeZone is an IANA time zone name (e.g. "UTC", "Europe/Moscow") used to
                  evaluate schedule windows. Defaults to UTC if empty.
                type: string
            required:
            - schedule
            - targets
            type: object
          status:
            description: status defines the observed state of GreenScalerService
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the GreenScalerService resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastAppliedReplicas:
                description: lastAppliedReplicas is the replica count last written
                  to target workloads.
                format: int32
                type: integer
              lastReconcileTime:
                description: lastReconcileTime is when status was last updated successfully
                  (controller clock).
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
